<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>3-0-lympics Dashboard</title>

<style>
:root {
  --bg1: #07131c;
  --bg2: #0d2230;
  --panel: rgba(255,255,255,0.06);
  --panel-border: rgba(255,255,255,0.10);
  --text: #f8fafc;
  --muted: #d5dee7;
  --teal: #14b8a6;
  --teal-soft: rgba(20,184,166,0.16);
  --teal-outline: rgba(20,184,166,0.45);
  --shadow: 0 12px 28px rgba(0,0,0,0.28);
  --radius: 22px;
  --gap: 16px;

  --tim-bg: rgba(34,197,94,0.24);
  --kevin-bg: rgba(250,204,21,0.24);
  --shivani-bg: rgba(168,85,247,0.24);
  --chris-bg: rgba(59,130,246,0.24);
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  height: 100%;
  overflow: hidden;
  font-family: Arial, Helvetica, sans-serif;
  color: var(--text);
  background:
    radial-gradient(circle at top left, rgba(20,184,166,0.12), transparent 24%),
    linear-gradient(160deg, var(--bg1), var(--bg2));
}

body { padding: 14px; }

.dashboard {
  height: calc(100vh - 28px);
  display: grid;
  grid-template-rows: auto 1fr;
  gap: var(--gap);
}

.title-bar {
  text-align: center;
  font-size: 1.6rem;
  font-weight: 900;
}

/* NORMAL DASHBOARD */
.dashboard-content {
  display: grid;
  grid-template-columns: minmax(0, 1.62fr) minmax(360px, 1.08fr);
  gap: var(--gap);
}

.panel {
  border-radius: var(--radius);
  border: 1px solid var(--panel-border);
  background: var(--panel);
  box-shadow: var(--shadow);
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

.panel-inner {
  padding: 10px 12px;
  flex: 1;
  display: flex;
  flex-direction: column;
}

.panel-title {
  color: var(--teal);
  font-size: 0.95rem;
  font-weight: 900;
  text-transform: uppercase;
}

.table-wrap { flex: 1; }

table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0 4px;
}

td, th {
  font-size: 0.85rem;
  text-align: center;
}

.time-col { width: 100px; }
.team-tim { background: var(--tim-bg); }
.team-kevin { background: var(--kevin-bg); }
.team-shivani { background: var(--shivani-bg); }
.team-chris { background: var(--chris-bg); }

/* CLOSING MODE */
.closing-mode {
  height: 100%;
  border-radius: var(--radius);
  overflow: hidden;
}

.closing-mode.hidden { display: none; }

.closing-frame {
  width: 100%;
  height: 100%;
  border: none;
  background: white;
}
</style>
</head>

<body>

<div class="dashboard">

  <!-- TITLE ALWAYS VISIBLE -->
  <div class="title-bar">🏆 3-0-lympics Dashboard 🏆</div>

  <!-- NORMAL DASHBOARD -->
  <div class="dashboard-content" id="dashboard-content">

    <section class="panel">
      <div class="panel-inner">
        <div class="panel-title">Schedule + Scores</div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th class="time-col">Time</th>
                <th>Event</th>
                <th>Tim</th>
                <th>Kevin</th>
                <th>Shivani</th>
                <th>Chris</th>
              </tr>
            </thead>
            <tbody id="sched-body"></tbody>
          </table>
        </div>
      </div>
    </section>

    <section class="panel">
      <div class="panel-inner">
        <div class="panel-title">Current Game</div>
        <div id="game-title-1"></div>
        <div id="game-rules-1"></div>
      </div>
    </section>

  </div>

  <!-- FULL SCREEN GRAPH -->
  <div class="closing-mode hidden" id="closing-mode">
    <iframe id="closing-frame" class="closing-frame"></iframe>
  </div>

</div>

<script>
const CLOSING_GRAPH_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRQrpYFX76QhfuyNeiHgGz_8t7dY9UuSWnj7QjLNYfVp9Fvr2lN0jZEvg2FWORE0oTeluWMmdr0OylS/pubchart?oid=707721946&format=interactive";

function setClosingMode(isClosing) {
  const dash = document.getElementById("dashboard-content");
  const closing = document.getElementById("closing-mode");
  const frame = document.getElementById("closing-frame");

  if (isClosing) {
    dash.style.display = "none";
    closing.classList.remove("hidden");
    if (!frame.src) frame.src = CLOSING_GRAPH_URL;
  } else {
    dash.style.display = "grid";
    closing.classList.add("hidden");
    frame.src = "";
  }
}

async function checkGameState() {
  try {
    const res = await fetch("https://docs.google.com/spreadsheets/d/1XRQaYtpF73oGmPD8fKEt81taq0dXysXRZt66Yma2Lzs/export?format=csv&gid=1263608187");
    const text = await res.text();

    const rows = text.split("\n").map(r => r.split(","));

    // Find the row where Event exists (skip header)
    const event = rows[1]?.[0]?.trim().toLowerCase();

    const isClosing = event === "closing ceremony";

    setClosingMode(isClosing);

  } catch (err) {
    console.error("Error checking game state:", err);
  }
}

// run once + refresh every 10s
checkGameState();
setInterval(checkGameState, 10000);
</script>

</body>
</html>
